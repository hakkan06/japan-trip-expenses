apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: japan-app-ingress
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
  - hosts:
    - japan.185.229.119.58.nip.io
    secretName: japan-app-tls-secret
  rules:
  - host: japan.185.229.119.58.nip.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: japan-app-service
            port:
              number: 3000
