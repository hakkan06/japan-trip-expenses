apiVersion: apps/v1
kind: Deployment
metadata:
  name: japan-db-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: japan-db
  template:
    metadata:
      labels:
        app: japan-db
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        env:
        - name: POSTGRES_USER
          value: "japan_user"
        - name: POSTGRES_PASSWORD
          value: "japan_password"
        - name: POSTGRES_DB
          value: "japan_expenses"
        ports:
        - containerPort: 5432
        volumeMounts:
        - name: db-storage
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: db-storage
        hostPath:
          path: /var/lib/rancher/k3s/storage/japan-db
          type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: japan-db-service
spec:
  selector:
    app: japan-db
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
